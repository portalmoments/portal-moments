<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Moments</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0A0A0A; --gray: #888888; --border: #E0E0E0; --white: #FFFFFF; }
  html { scroll-behavior: smooth; }
  body { background: var(--white); color: var(--black); font-family: 'Jost', sans-serif; font-weight: 300; }

  header { padding: 3rem 2rem 0.3rem; text-align: center; }
  .site-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.6rem; letter-spacing: -0.02em; text-transform: uppercase; color: var(--black); text-decoration: none; display: block; margin-bottom: 0.6rem; }
  .site-slogan { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 1rem; color: var(--gray); letter-spacing: 0.04em; display: block; margin-bottom: 0.6rem; }
  .portal-link { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); text-decoration: none; display: inline-block; border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: color 0.2s ease, border-color 0.2s ease; }
  .portal-link:hover { color: var(--black); border-color: var(--black); }

  .header-divider { display: none; }

  .grid-section { padding: 0.8rem; }
  .photo-grid { columns: 3; column-gap: 6px; }
  .grid-item { break-inside: avoid; margin-bottom: 6px; overflow: hidden; cursor: pointer; position: relative; }
  .grid-item img { width: 100%; display: block; transition: opacity 0.3s ease; }
  .grid-item:hover img { opacity: 0.88; }
  .grid-item::before { content: ''; position: absolute; inset: 0; z-index: 1; transition: opacity 0.6s ease; }
  .grid-item.loaded::before { opacity: 0; pointer-events: none; }
  .grid-item:nth-child(1)::before { background: #3a3a35; }
  .grid-item:nth-child(2)::before { background: #2a4a5a; }
  .grid-item:nth-child(3)::before { background: #4a5a3a; }
  .grid-item:nth-child(4)::before { background: #3a3530; }
  .grid-item:nth-child(5)::before { background: #505868; }
  .grid-item:nth-child(6)::before { background: #5a4a2a; }
  .grid-item:nth-child(7)::before { background: #3a4a5a; }
  .grid-item:nth-child(8)::before { background: #4a3525; }
  .grid-item:nth-child(9)::before { background: #354045; }
  .grid-item:nth-child(10)::before { background: #4a3530; }
  .grid-item:nth-child(11)::before { background: #304550; }
  .grid-item:nth-child(12)::before { background: #3a4a3a; }
  .grid-item:nth-child(13)::before { background: #454535; }
  .grid-item:nth-child(14)::before { background: #2a3a4a; }
  .grid-item:nth-child(15)::before { background: #3a4535; }
  .grid-item:nth-child(16)::before { background: #453530; }
  .grid-item:nth-child(17)::before { background: #304040; }
  .grid-item:nth-child(18)::before { background: #3a3040; }
  .grid-item:nth-child(19)::before { background: #404535; }
  .grid-item:nth-child(20)::before { background: #2a3530; }
  .grid-item:nth-child(21)::before { background: #354540; }
  .grid-item:nth-child(22)::before { background: #453040; }
  .grid-item:nth-child(23)::before { background: #304535; }
  .grid-item:nth-child(24)::before { background: #3a4030; }
  .grid-item:nth-child(25)::before { background: #354535; }
  .grid-item:nth-child(26)::before { background: #403530; }
  .grid-item:nth-child(27)::before { background: #304040; }

  footer { border-top: none; padding: 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; }
  .footer-instagram { display: flex; align-items: center; justify-content: center; color: var(--gray); text-decoration: none; transition: color 0.2s ease; }
  .footer-instagram:hover { color: var(--black); }
  .footer-instagram svg { width: 20px; height: 20px; }
  .footer-copy { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #BBBBBB; }

  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox-img-wrap { max-width: 90vw; max-height: 90vh; display: flex; align-items: center; justify-content: center; }
  .lightbox-img-wrap img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; transition: opacity 0.2s ease; }
  .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.6); cursor: pointer; font-family: 'Jost', sans-serif; font-weight: 200; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; transition: color 0.2s ease; }
  .lightbox-close:hover { color: white; }
  .lightbox-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 1rem; font-size: 1.5rem; line-height: 1; transition: color 0.2s ease; }
  .lightbox-arrow:hover { color: white; }
  .lightbox-arrow.prev { left: 1rem; }
  .lightbox-arrow.next { right: 1rem; }
  .lightbox-counter { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.3); font-family: 'Jost', sans-serif; font-weight: 300; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-blur { position: absolute; inset: 0; background: rgba(255,255,255,0); transition: background 0.5s ease; }
  .modal-blur.active { background: rgba(255,255,255,0.55); }
  .modal { position: relative; z-index: 1; background: var(--white); max-width: 380px; width: 90%; padding: 3rem 2.5rem; text-align: center; transform: translateY(12px); transition: transform 0.35s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 2rem; color: var(--black); margin-bottom: 0.4rem; }
  .modal-sub { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 2.5rem; line-height: 1.8; }
  .modal-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 0.75rem 0; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.9rem; color: var(--black); text-align: center; letter-spacing: 0.05em; outline: none; transition: border-color 0.2s ease; margin-bottom: 2rem; }
  .modal-input::placeholder { color: #CCCCCC; }
  .modal-input:focus { border-color: var(--black); }
  .modal-btn { width: 100%; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: white; background: rgba(10,10,10,0.8); border: none; padding: 0.9rem 2rem; cursor: pointer; transition: background 0.2s ease; margin-bottom: 1.5rem; }
  .modal-btn:hover { background: rgba(10,10,10,0.95); }
  .modal-error { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: #cc4444; margin-bottom: 1rem; display: none; }
  .modal-close { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); background: none; border: none; cursor: pointer; transition: color 0.2s ease; }
  .modal-close:hover { color: var(--black); }

  @media (max-width: 900px) { .photo-grid { columns: 2; } }
  @media (max-width: 560px) { .photo-grid { columns: 1; } .grid-section { padding: 0.75rem; } .lightbox-arrow.prev { left: 0.25rem; } .lightbox-arrow.next { right: 0.25rem; } .site-name { font-size: 1.2rem; } .site-slogan { font-size: 0.85rem; } .modal { padding: 2rem 1.5rem; } }
</style>
</head>
<body>

<header>
  <a href="#" class="site-name">Portal Moments</a>
  <span class="site-slogan">Freezing your essence in spontaneous moments.</span>
  <a href="#" class="portal-link" onclick="openPortal(event)">Enter Your Portal</a>
</header>

<div class="header-divider"></div>

<main>
  <div class="grid-section">
    <div class="photo-grid" id="photoGrid">
      <div class="grid-item" onclick="openLightbox(0)"><img src="./images/photo1.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(1)"><img src="./images/photo2.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(2)"><img src="./images/photo3.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(3)"><img src="./images/photo4.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(4)"><img src="./images/photo5.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(5)"><img src="./images/photo6.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(6)"><img src="./images/photo7.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(7)"><img src="./images/photo8.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(8)"><img src="./images/photo9.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(9)"><img src="./images/photo10.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(10)"><img src="./images/photo11.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(11)"><img src="./images/photo12.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(12)"><img src="./images/photo13.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(13)"><img src="./images/photo14.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(14)"><img src="./images/photo15.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(15)"><img src="./images/photo16.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(16)"><img src="./images/photo17.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(17)"><img src="./images/photo18.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(18)"><img src="./images/photo19.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(19)"><img src="./images/photo20.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(20)"><img src="./images/photo21.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(21)"><img src="./images/photo22.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(22)"><img src="./images/photo23.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(23)"><img src="./images/photo24.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(24)"><img src="./images/photo25.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(25)"><img src="./images/photo26.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
      <div class="grid-item" onclick="openLightbox(26)"><img src="./images/photo27.jpg" alt="Portal Moment" onload="this.parentElement.classList.add('loaded')" /></div>
    </div>
  </div>
</main>

<footer>
  <a href="https://instagram.com/portalmoments" class="footer-instagram" target="_blank" title="@portalmoments">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
      <circle cx="12" cy="12" r="4"/>
      <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
    </svg>
  </a>
  <span class="footer-copy">© Portal Moments 2026 — Anna Totska</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  <button class="lightbox-arrow prev" onclick="changeLightbox(-1)">&#8592;</button>
  <div class="lightbox-img-wrap"><img src="" alt="Portal Moment" id="lightboxImg" /></div>
  <button class="lightbox-arrow next" onclick="changeLightbox(1)">&#8594;</button>
  <span class="lightbox-counter" id="lightboxCounter"></span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-blur" id="modalBlur" onclick="closePortal()"></div>
  <div class="modal">
    <p class="modal-title">Your Portal</p>
    <p class="modal-sub">Enter the email you used to contact us.<br>Your moment is waiting.</p>
    <input type="email" class="modal-input" id="portalEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter') findPortal()" />
    <button class="modal-btn" onclick="findPortal()">Find My Photos</button>
    <p class="modal-error" id="portalError">Email not found — please check and try again</p>
    <button class="modal-close" onclick="closePortal()">← Return</button>
  </div>
</div>

<script>
  function getPhotos() {
    return Array.from(document.querySelectorAll('.grid-item img')).map(img => img.src);
  }

  window.addEventListener('load', function() {
    const grid = document.getElementById('photoGrid');
    const items = Array.from(grid.children);
    items.reverse().forEach(item => grid.appendChild(item));
  });

  let currentIndex = 0;

  function openLightbox(index) {
    const photos = getPhotos();
    currentIndex = index;
    document.getElementById('lightboxImg').src = photos[currentIndex];
    document.getElementById('lightboxCounter').textContent = (currentIndex + 1) + ' / ' + photos.length;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  function changeLightbox(dir) {
    const photos = getPhotos();
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    const img = document.getElementById('lightboxImg');
    img.style.opacity = '0';
    setTimeout(() => {
      img.src = photos[currentIndex];
      img.style.opacity = '1';
      document.getElementById('lightboxCounter').textContent = (currentIndex + 1) + ' / ' + photos.length;
    }, 150);
  }

  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('open')) {
      if (e.key === 'ArrowLeft') changeLightbox(-1);
      if (e.key === 'ArrowRight') changeLightbox(1);
      if (e.key === 'Escape') closeLightbox();
    }
  });

  function openPortal(e) {
    e.preventDefault();
    document.getElementById('portalError').style.display = 'none';
    document.getElementById('portalEmail').value = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(function() {
      document.getElementById('modalBlur').classList.add('active');
    }, 20);
  }

  function closePortal() {
    document.getElementById('modalBlur').classList.remove('active');
    setTimeout(function() {
      document.getElementById('modalOverlay').classList.remove('open');
    }, 400);
  }

  async function findPortal() {
    const email = document.getElementById('portalEmail').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('portalError').style.display = 'block';
      return;
    }
    try {
      const res = await fetch('/api/clients?action=get&email=' + encodeURIComponent(email), {
        headers: { 'Authorization': 'Bearer pm-agent-2026' }
      });
      const data = await res.json();
      if (data.client) {
        const client = data.client;
        const firstName = encodeURIComponent(client.name.split(' ')[0]);
        const fullName = encodeURIComponent(client.name);
        const stateParam = (client.status === 'editing' || client.status === 'delivered') ? '&state=' + client.status : '';
        const expiryParam = client.expiry ? '&expiry=' + client.expiry : '';
        window.location.href = 'gallery.html?email=' + encodeURIComponent(email) + '&folder=' + client.folder + '&name=' + firstName + '&fullname=' + fullName + expiryParam + stateParam;
      } else {
        document.getElementById('portalError').style.display = 'block';
      }
    } catch(e) {
      document.getElementById('portalError').style.display = 'block';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePortal();
  });
</script>
</body>
</html>
