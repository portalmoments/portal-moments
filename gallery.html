<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Portal — Portal Moments</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0A0A0A; --gray: #888888; --border: #E0E0E0; --white: #FFFFFF; }
  body { background: var(--white); color: var(--black); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }
  header { padding: 2.5rem 2rem 1.5rem; text-align: center; border-bottom: 1px solid var(--border); }
  .site-name { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.4rem; letter-spacing: -0.02em; text-transform: uppercase; color: var(--black); text-decoration: none; display: block; margin-bottom: 0.3rem; }
  .site-slogan { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 0.65rem; color: var(--gray); letter-spacing: 0.04em; display: block; }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; }
  .loading-text { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); }
  .error-state, .editing-state, .expired-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1.5rem; text-align: center; padding: 3rem 2rem; }
  .error-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; color: var(--black); }
  .error-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); line-height: 2; max-width: 400px; }
  .back-link { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px; display: inline-block; transition: color 0.2s ease; }
  .back-link:hover { color: var(--black); }
  .editing-divider { width: 40px; height: 1px; background: var(--border); }
  .gallery-hero { padding: 3rem 2rem 1.5rem; text-align: center; }
  .gallery-greeting { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 1.8rem; color: var(--black); margin-bottom: 0.5rem; }
  .gallery-sub { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); line-height: 2; }
  .packages { display: flex; gap: 1px; margin: 2rem 1.5rem; background: var(--border); border: 1px solid var(--border); }
  .package { flex: 1; background: var(--white); padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.2s ease; }
  .package:hover { background: #F5F5F5; }
  .package.selected { background: rgba(10,10,10,0.85); }
  .package-name { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--black); margin-bottom: 0.4rem; display: block; transition: color 0.2s ease; }
  .package.selected .package-name { color: var(--white); }
  .package-price { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--black); display: block; margin-bottom: 0.3rem; transition: color 0.2s ease; }
  .package.selected .package-price { color: var(--white); }
  .package-desc { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); display: block; transition: color 0.2s ease; }
  .package.selected .package-desc { color: rgba(255,255,255,0.6); }
  .selection-instructions { text-align: center; padding: 1.5rem 1.5rem 0.5rem; }
  .selection-title { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); }
  .selection-counter { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.1rem; color: var(--black); margin-top: 0.4rem; display: block; }
  .selection-hint { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: #BBBBBB; margin-top: 0.3rem; display: block; }
  .gallery-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray); text-align: center; padding: 1rem 0 0.5rem; }
  .gallery-note { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: #BBBBBB; text-align: center; margin-bottom: 1.5rem; }
  .photo-grid { columns: 3; column-gap: 6px; padding: 0 1.5rem; }
  .photo-item { break-inside: avoid; margin-bottom: 6px; position: relative; overflow: hidden; cursor: pointer; transition: opacity 0.2s ease; }
  .photo-item img { width: 100%; display: block; pointer-events: none; user-select: none; -webkit-user-drag: none; }
  .photo-item:hover { opacity: 0.92; }
  .photo-item::after { content: 'Portal Moments'; position: absolute; bottom: 10px; right: 12px; font-family: 'Jost', sans-serif; font-weight: 200; font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.5); pointer-events: none; z-index: 2; }
  .photo-item.photo-selected::before { content: ''; position: absolute; inset: 0; background: rgba(10,10,10,0.35); z-index: 3; pointer-events: none; }
  .photo-item.photo-selected .checkmark { display: flex; }
  .checkmark { display: none; position: absolute; top: 10px; right: 10px; width: 24px; height: 24px; background: var(--white); border-radius: 50%; align-items: center; justify-content: center; z-index: 4; pointer-events: none; font-size: 12px; }
  .photo-item.photo-dimmed { opacity: 0.4; cursor: not-allowed; }
  .download-item { break-inside: avoid; margin-bottom: 6px; position: relative; overflow: hidden; }
  .download-item img { width: 100%; display: block; }
  .download-btn { position: absolute; bottom: 10px; right: 10px; background: rgba(255,255,255,0.92); color: var(--black); font-family: 'Jost', sans-serif; font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 6px 12px; text-decoration: none; opacity: 0; transition: opacity 0.2s ease; border: none; cursor: pointer; }
  .download-item:hover .download-btn { opacity: 1; }

  /* EXPIRY BANNER — compact centered */
  .expiry-banner-wrap { text-align: center; padding: 0 1.5rem 2rem; }
  .expiry-banner { display: inline-flex; align-items: center; gap: 0.75rem; background: #FAFAFA; border: 1px solid var(--border); padding: 0.85rem 1.25rem; }
  .expiry-banner.warning { border-color: #cc4444; }
  .expiry-banner-text { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--black); }
  .expiry-banner.warning .expiry-banner-text { color: #cc4444; }
  .expiry-banner-days { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--black); white-space: nowrap; }
  .expiry-banner.warning .expiry-banner-days { color: #cc4444; }

  .download-all-section { text-align: center; padding: 2rem 1.5rem; border-top: 1px solid var(--border); margin-top: 2rem; }
  .download-all-btn { display: inline-block; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--white); background: rgba(10,10,10,0.8); border: none; padding: 1rem 3rem; cursor: pointer; transition: background 0.2s ease; }
  .download-all-btn:hover { background: rgba(10,10,10,0.95); }
  .download-all-btn:disabled { background: rgba(10,10,10,0.3); cursor: default; }
  .download-all-note { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: #BBBBBB; margin-top: 0.75rem; }
  .purchase-section { padding: 2.5rem 1.5rem; text-align: center; border-top: 1px solid var(--border); margin-top: 2rem; }
  .purchase-summary { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 2rem; line-height: 2; }
  .purchase-btn { display: inline-block; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--white); background: rgba(10,10,10,0.8); border: none; padding: 1rem 3rem; cursor: pointer; transition: background 0.2s ease; }
  .purchase-btn:hover { background: rgba(10,10,10,0.95); }
  .purchase-btn:disabled { background: rgba(10,10,10,0.2); cursor: default; }
  .purchase-note { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: #BBBBBB; margin-top: 1rem; }
  .free-note { background: #FAFAFA; border: 1px solid var(--border); padding: 1.2rem 1.5rem; margin: 0 1.5rem 2rem; text-align: center; }
  .free-note-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--gray); }
  .expiry-note { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); text-align: center; margin-bottom: 2rem; }
  footer { border-top: 1px solid var(--border); padding: 1.5rem; text-align: center; }
  .footer-copy { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #CCCCCC; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; pointer-events: none; }
  .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif; transition: color 0.2s ease; }
  .lightbox-close:hover { color: white; }
  .lightbox-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 1rem; font-size: 1.5rem; transition: color 0.2s ease; }
  .lightbox-arrow:hover { color: white; }
  .lightbox-arrow.prev { left: 1rem; }
  .lightbox-arrow.next { right: 1rem; }
  @media (max-width: 768px) { .photo-grid { columns: 2; } .packages { flex-direction: column; } }
  @media (max-width: 480px) { .photo-grid { columns: 1; } }
</style>
</head>
<body>

<header>
  <a href="/" class="site-name">Portal Moments</a>
  <span class="site-slogan">Freezing your essence in spontaneous moments.</span>
</header>

<div id="app">
  <div class="loading-state">
    <span class="loading-text">Finding your moment...</span>
  </div>
</div>

<footer>
  <span class="footer-copy">© Portal Moments 2026 — Anna Totska</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  <button class="lightbox-arrow prev" onclick="changeLightbox(-1)">&#8592;</button>
  <img src="" alt="Portal Moment" id="lightboxImg" />
  <button class="lightbox-arrow next" onclick="changeLightbox(1)">&#8594;</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  var urlParams = new URLSearchParams(window.location.search);
  var clientEmail = urlParams.get('email');
  var clientFolder = urlParams.get('folder');
  var clientName = urlParams.get('name') || 'You';
  var clientFullName = urlParams.get('fullname') || clientName;
  var expiryDate = urlParams.get('expiry');
  var galleryState = urlParams.get('state') || 'preview';
  var selectedParam = urlParams.get('selected');
  var selectedPhotoIds = selectedParam ? selectedParam.split(',') : [];

  var packages = [
    { id: 'spark', name: 'Spark Pack', price: '$111', desc: '5 edited photos', limit: 5, stripeLink: 'https://buy.stripe.com/8x23cvdsygHparP3nN5AQ01' },
    { id: 'portal', name: 'Full Portal', price: '$222', desc: '10 edited photos', limit: 10, stripeLink: 'https://buy.stripe.com/aFaeVd6064YH7fD8I75AQ00' }
  ];

  var selectedPackage = null;
  var selectedPhotos = [];
  var lightboxIndex = 0;
  var galleryPhotos = [];

  function getExpiryBanner() {
    if (!expiryDate) return '';
    var days = Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
    var isWarning = days <= 7;
    var cls = isWarning ? 'expiry-banner warning' : 'expiry-banner';
    var msg = isWarning ? 'Download soon — this gallery expires in' : 'This gallery is available for';
    return '<div class="expiry-banner-wrap">' +
      '<div class="' + cls + '">' +
        '<span class="expiry-banner-text">' + msg + '</span>' +
        '<span class="expiry-banner-days">' + days + ' day' + (days !== 1 ? 's' : '') + '</span>' +
      '</div>' +
    '</div>';
  }

  async function loadGallery() {
    if (!clientEmail || !clientFolder) { showError(); return; }
    if (expiryDate && new Date() > new Date(expiryDate)) { showExpired(); return; }
    if (galleryState === 'editing') { showEditing(); return; }

    if (galleryState === 'delivered') {
      try {
        var r = await fetch('/api/gallery?folder=' + encodeURIComponent(clientFolder + '/edited'));
        var d = await r.json();
        if (!d.photos || d.photos.length === 0) { showEditing(); return; }
        galleryPhotos = d.photos;
        renderDeliveredGallery(clientName, galleryPhotos);
      } catch(e) { showEditing(); }
      return;
    }

    try {
      var r = await fetch('/api/gallery?folder=' + encodeURIComponent(clientFolder + '/previews'));
      var d = await r.json();
      if (!d.photos || d.photos.length === 0) {
        var r2 = await fetch('/api/gallery?folder=' + encodeURIComponent(clientFolder));
        var d2 = await r2.json();
        if (!d2.photos || d2.photos.length === 0) { showError(); return; }
        galleryPhotos = d2.photos;
      } else {
        galleryPhotos = d.photos;
      }
      // If purchased/editing state and selected photos exist, filter to show only selected
      if ((galleryState === 'purchased' || galleryState === 'editing') && selectedPhotoIds.length > 0) {
        galleryPhotos = galleryPhotos.filter(function(p) {
          return selectedPhotoIds.some(function(id) {
            return p.publicId === id || p.publicId.endsWith(id);
          });
        });
      }
      renderPreviewGallery(clientName, galleryPhotos);
    } catch(e) { showError(); }
  }

  function renderPreviewGallery(name, photos) {
    var daysLeft = '';
    if (expiryDate) {
      var days = Math.ceil((new Date(expiryDate) - new Date()) / (1000 * 60 * 60 * 24));
      daysLeft = '<p class="expiry-note">Your gallery is available for ' + days + ' more day' + (days !== 1 ? 's' : '') + '.</p>';
    }
    document.getElementById('app').innerHTML =
      '<div class="gallery-hero">' +
        '<p class="gallery-greeting">Hello, ' + name + '.</p>' +
        '<p class="gallery-sub">' + (galleryState === 'purchased' || galleryState === 'editing' ? 'Here are the photos you selected.<br>We are carefully editing them for you.' : 'Your Portal Moment is ready.<br>Select a package, then choose your favourite photos.') + '</p>' +
      '</div>' +
      '<div class="free-note"><p class="free-note-text">Your complimentary photo has already been sent to your email.</p></div>' +
      daysLeft +
      '<div class="packages">' +
        packages.map(function(pkg) {
          return '<div class="package" id="pkg-' + pkg.id + '" onclick="selectPackage(\'' + pkg.id + '\')">' +
            '<span class="package-name">' + pkg.name + '</span>' +
            '<span class="package-price">' + pkg.price + '</span>' +
            '<span class="package-desc">' + pkg.desc + '</span>' +
          '</div>';
        }).join('') +
      '</div>' +
      '<div class="selection-instructions" id="selectionInstructions" style="display:none">' +
        '<p class="selection-title">Select your photos</p>' +
        '<span class="selection-counter" id="selectionCounter">0 selected</span>' +
        '<span class="selection-hint">Tap a photo to select it</span>' +
      '</div>' +
      '<p class="gallery-label">Your Session</p>' +
      '<p class="gallery-note">Watermarked previews — full resolution delivered after purchase</p>' +
      '<div class="photo-grid" id="photoGrid">' +
        photos.map(function(photo, i) {
          return '<div class="photo-item" id="photo-' + i + '" onclick="togglePhoto(' + i + ')">' +
            '<img src="' + photo.url + '" alt="Your Portal Moment" loading="lazy" draggable="false" />' +
            '<div class="checkmark">✓</div>' +
          '</div>';
        }).join('') +
      '</div>' +
      (galleryState === 'purchased' || galleryState === 'editing' ? '' :
      '<div class="purchase-section">' +
        '<p class="purchase-summary" id="purchaseSummary">Select a package above to begin</p>' +
        '<button class="purchase-btn" id="purchaseBtn" disabled onclick="handlePurchase()">Purchase Collection</button>' +
        '<p class="purchase-note">Secure payment via Stripe · Full resolution delivered after purchase</p>' +
      '</div>');
    document.querySelectorAll('.photo-item img').forEach(function(img) {
      img.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    });
  }

  function renderDeliveredGallery(name, photos) {
    var zipName = 'Portal-Moments-' + clientFullName.replace(/\s+/g, '-');
    document.getElementById('app').innerHTML =
      '<div class="gallery-hero">' +
        '<p class="gallery-greeting">Hello, ' + name + '.</p>' +
        '<p class="gallery-sub">Your edited photos are ready.<br>They are yours forever — download and keep them.</p>' +
      '</div>' +
      getExpiryBanner() +
      '<p class="gallery-label">Your Collection</p>' +
      '<p class="gallery-note">Full resolution · Hover each photo to download individually</p>' +
      '<div class="photo-grid">' +
        photos.map(function(photo, i) {
          return '<div class="download-item">' +
            '<img src="' + photo.url + '" alt="Your Portal Moment" loading="lazy" />' +
            '<a class="download-btn" href="' + photo.fullUrl + '" download target="_blank">Download</a>' +
          '</div>';
        }).join('') +
      '</div>' +
      '<div class="download-all-section">' +
        '<p style="font-family:\'Cormorant Garamond\',serif;font-style:italic;font-size:1rem;color:var(--gray);margin-bottom:0.5rem">Download your entire collection</p>' +
        '<p style="font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;color:#BBBBBB;margin-bottom:1.5rem">Saves as ' + zipName + '.zip</p>' +
        '<button class="download-all-btn" id="downloadAllBtn" onclick="downloadAllZip(\'' + zipName + '\')">Download All Photos</button>' +
        '<p class="download-all-note" id="downloadAllNote">All photos packaged into one ZIP file</p>' +
      '</div>';
  }

  async function downloadAllZip(zipName) {
    var btn = document.getElementById('downloadAllBtn');
    var note = document.getElementById('downloadAllNote');
    btn.disabled = true;
    btn.textContent = 'Preparing your photos...';
    note.textContent = 'Please wait — this may take a moment';
    try {
      var zip = new JSZip();
      var folder = zip.folder(zipName);
      await Promise.all(galleryPhotos.map(async function(photo, i) {
        var response = await fetch(photo.fullUrl);
        var blob = await response.blob();
        var ext = photo.fullUrl.split('.').pop().split('?')[0] || 'jpg';
        folder.file('photo-' + (i + 1) + '.' + ext, blob);
      }));
      var content = await zip.generateAsync({ type: 'blob' });
      var url = URL.createObjectURL(content);
      var a = document.createElement('a');
      a.href = url;
      a.download = zipName + '.zip';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      btn.disabled = false;
      btn.textContent = 'Download All Photos';
      note.textContent = 'Download complete — check your downloads folder';
    } catch(err) {
      btn.disabled = false;
      btn.textContent = 'Download All Photos';
      note.textContent = 'Something went wrong — try downloading photos individually above';
    }
  }

  function showEditing() {
    document.getElementById('app').innerHTML =
      '<div class="editing-state">' +
        '<p class="gallery-greeting">Hello, ' + clientName + '.</p>' +
        '<div class="editing-divider"></div>' +
        '<p style="font-family:\'Cormorant Garamond\',serif;font-style:italic;font-size:1.4rem;color:var(--black)">Your photos are being edited.</p>' +
        '<p class="error-sub">Each photo is being prepared with the same care as the moment itself.<br>You will receive an email when your collection is ready.</p>' +
        '<a href="mailto:portalmoments@gmail.com" class="back-link">Contact Anna</a>' +
      '</div>';
  }

  function showError() {
    document.getElementById('app').innerHTML =
      '<div class="error-state">' +
        '<p class="error-title">Portal not found.</p>' +
        '<p class="error-sub">We couldn\'t find a gallery for this email address.<br>Please check your email or contact us directly.</p>' +
        '<a href="/" class="back-link">← Return to Portal Moments</a>' +
      '</div>';
  }

  function showExpired() {
    document.getElementById('app').innerHTML =
      '<div class="expired-state">' +
        '<p class="error-title">This portal has expired.</p>' +
        '<p class="error-sub">Your gallery was available for 30 days.<br>Please contact us if you need more time.</p>' +
        '<a href="mailto:portalmoments@gmail.com" class="back-link">Contact Anna</a>' +
      '</div>';
  }

  function selectPackage(id) {
    selectedPackage = packages.find(function(p) { return p.id === id; });
    selectedPhotos = [];
    packages.forEach(function(p) { document.getElementById('pkg-' + p.id).classList.remove('selected'); });
    document.getElementById('pkg-' + id).classList.add('selected');
    document.querySelectorAll('.photo-item').forEach(function(item) { item.classList.remove('photo-selected', 'photo-dimmed'); });
    document.getElementById('selectionInstructions').style.display = 'block';
    updateCounter();
    updatePurchaseButton();
  }

  function togglePhoto(index) {
    if (!selectedPackage) return;
    var item = document.getElementById('photo-' + index);
    var isSelected = item.classList.contains('photo-selected');
    if (isSelected) {
      item.classList.remove('photo-selected');
      selectedPhotos = selectedPhotos.filter(function(i) { return i !== index; });
    } else {
      if (selectedPhotos.length >= selectedPackage.limit) return;
      item.classList.add('photo-selected');
      selectedPhotos.push(index);
    }
    var limitReached = selectedPhotos.length >= selectedPackage.limit;
    document.querySelectorAll('.photo-item').forEach(function(item) {
      if (!item.classList.contains('photo-selected')) {
        limitReached ? item.classList.add('photo-dimmed') : item.classList.remove('photo-dimmed');
      }
    });
    updateCounter();
    updatePurchaseButton();
  }

  function updateCounter() {
    if (!selectedPackage) return;
    document.getElementById('selectionCounter').textContent = selectedPhotos.length + ' of ' + selectedPackage.limit + ' selected';
  }

  function updatePurchaseButton() {
    if (!selectedPackage) return;
    var btn = document.getElementById('purchaseBtn');
    var summary = document.getElementById('purchaseSummary');
    if (selectedPhotos.length === selectedPackage.limit) {
      btn.disabled = false;
      summary.textContent = selectedPackage.name + ' · ' + selectedPackage.price + ' · ' + selectedPhotos.length + ' photos selected';
    } else {
      var rem = selectedPackage.limit - selectedPhotos.length;
      btn.disabled = true;
      summary.textContent = 'Select ' + rem + ' more photo' + (rem !== 1 ? 's' : '') + ' to continue';
    }
  }

  function handlePurchase() {
    if (!selectedPackage || selectedPhotos.length !== selectedPackage.limit) return;
    var selectedPublicIds = selectedPhotos.map(function(i) { return galleryPhotos[i].publicId; });

    var btn = document.getElementById('purchaseBtn');
    btn.textContent = 'Processing...';
    btn.disabled = true;

    fetch('/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: clientEmail,
        selectedPhotos: selectedPublicIds,
        package: selectedPackage.id
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.url) {
        window.location.href = data.url;
      } else {
        alert('Checkout error: ' + (data.error || 'Unknown error'));
        btn.textContent = 'Purchase Collection';
        btn.disabled = false;
      }
    })
    .catch(function(err) {
      alert('Something went wrong. Please try again.');
      btn.textContent = 'Purchase Collection';
      btn.disabled = false;
    });
  }

  function openLightbox(index) {
    lightboxIndex = index;
    document.getElementById('lightboxImg').src = galleryPhotos[index].url;
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function changeLightbox(dir) {
    lightboxIndex = (lightboxIndex + dir + galleryPhotos.length) % galleryPhotos.length;
    document.getElementById('lightboxImg').src = galleryPhotos[lightboxIndex].url;
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'ArrowLeft') changeLightbox(-1);
      if (e.key === 'ArrowRight') changeLightbox(1);
      if (e.key === 'Escape') closeLightbox();
    }
  });
  document.addEventListener('contextmenu', function(e) {
    if (e.target.tagName === 'IMG') e.preventDefault();
  });

  loadGallery();
</script>
</body>
</html>
