<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Portal — Portal Moments</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0A0A0A; --gray: #888888; --border: #E0E0E0; --white: #FFFFFF; }
  body { background: var(--white); color: var(--black); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }
  header { padding: 2.5rem 2rem 1.5rem; text-align: center; border-bottom: 1px solid var(--border); }
  .site-name { font-family: 'Cinzel', serif; font-weight: 400; font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--black); text-decoration: none; display: block; margin-bottom: 0.3rem; }
  .site-slogan { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 0.75rem; color: var(--gray); display: block; }
  .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; }
  .loading-text { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gray); }
  .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 1rem; text-align: center; padding: 2rem; }
  .error-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; color: var(--black); }
  .error-sub { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); line-height: 2; }
  .back-link { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); text-decoration: none; border-bottom: 1px solid var(--border); padding-bottom: 2px; margin-top: 1rem; display: inline-block; transition: color 0.2s ease; }
  .back-link:hover { color: var(--black); }
  .gallery-hero { padding: 3rem 2rem 1.5rem; text-align: center; }
  .gallery-greeting { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 1.8rem; color: var(--black); margin-bottom: 0.5rem; }
  .gallery-sub { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gray); line-height: 2; }
  .packages { display: flex; gap: 1px; margin: 2rem 1.5rem; background: var(--border); border: 1px solid var(--border); }
  .package { flex: 1; background: var(--white); padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: background 0.2s ease; position: relative; }
  .package:hover { background: #FAFAFA; }
  .package.selected { background: var(--black); }
  .package-name { font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--black); margin-bottom: 0.4rem; display: block; transition: color 0.2s ease; }
  .package.selected .package-name { color: var(--white); }
  .package-price { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--black); display: block; margin-bottom: 0.3rem; transition: color 0.2s ease; }
  .package.selected .package-price { color: var(--white); }
  .package-desc { font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); display: block; transition: color 0.2s ease; }
  .package.selected .package-desc { color: rgba(255,255,255,0.6); }
  .package-badge { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--black); color: var(--white); font-size: 0.5rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 3px 10px; white-space: nowrap; }
  .package.selected .package-badge { background: var(--white); color: var(--black); }
  .gallery-label { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gray); text-align: center; padding: 1rem 0 0.5rem; }
  .gallery-note { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: #BBBBBB; text-align: center; margin-bottom: 1.5rem; }
  .photo-grid { columns: 3; column-gap: 6px; padding: 0 1.5rem; }
  .photo-item { break-inside: avoid; margin-bottom: 6px; position: relative; overflow: hidden; cursor: pointer; }
  .photo-item img { width: 100%; display: block; transition: opacity 0.3s ease; }
  .photo-item:hover img { opacity: 0.9; }
  .photo-item::after { content: 'Portal Moments'; position: absolute; bottom: 10px; right: 12px; font-family: 'Jost', sans-serif; font-weight: 200; font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.7); text-shadow: 0 1px 3px rgba(0,0,0,0.4); pointer-events: none; z-index: 2; }
  .purchase-section { padding: 2.5rem 1.5rem; text-align: center; border-top: 1px solid var(--border); margin-top: 2rem; }
  .purchase-summary { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 2rem; line-height: 2; }
  .purchase-btn { display: inline-block; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--white); background: var(--black); border: none; padding: 1rem 3rem; cursor: pointer; transition: background 0.2s ease; }
  .purchase-btn:hover { background: #333; }
  .purchase-btn:disabled { background: #CCC; cursor: default; }
  .purchase-note { font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: #BBBBBB; margin-top: 1rem; }
  .free-note { background: #FAFAFA; border: 1px solid var(--border); padding: 1.2rem 1.5rem; margin: 0 1.5rem 2rem; text-align: center; }
  .free-note-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.95rem; color: var(--gray); }
  footer { border-top: 1px solid var(--border); padding: 1.5rem; text-align: center; }
  .footer-copy { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: #CCCCCC; }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  .lightbox.open { opacity: 1; pointer-events: all; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; }
  .lightbox-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-family: 'Jost', sans-serif; transition: color 0.2s ease; }
  .lightbox-close:hover { color: white; }
  .lightbox-arrow { position: fixed; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; padding: 1rem; font-size: 1.5rem; transition: color 0.2s ease; }
  .lightbox-arrow:hover { color: white; }
  .lightbox-arrow.prev { left: 1rem; }
  .lightbox-arrow.next { right: 1rem; }
  @media (max-width: 768px) { .photo-grid { columns: 2; } .packages { flex-direction: column; gap: 1px; } }
  @media (max-width: 480px) { .photo-grid { columns: 1; } }
</style>
</head>
<body>

<header>
  <a href="/" class="site-name">Portal Moments</a>
  <span class="site-slogan">Freezing your essence in spontaneous moments.</span>
</header>

<div id="app">
  <div class="loading-state">
    <span class="loading-text">Finding your moment...</span>
  </div>
</div>

<footer>
  <span class="footer-copy">© Portal Moments 2026 — Anna Totska</span>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">Close</button>
  <button class="lightbox-arrow prev" onclick="changeLightbox(-1)">&#8592;</button>
  <img src="" alt="Portal Moment" id="lightboxImg" />
  <button class="lightbox-arrow next" onclick="changeLightbox(1)">&#8594;</button>
</div>

<script>
  const CLOUD_NAME = 'dhmwbcjag';
  const BASE_URL = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/upload';

  const urlParams = new URLSearchParams(window.location.search);
  const clientEmail = urlParams.get('email');
  const clientFolder = urlParams.get('folder');

  

  let selectedPackage = null;
  let lightboxIndex = 0;
  let galleryPhotos = [];

 function loadGallery() {
    if (!clientEmail) {
      showError();
      return;
    }

    const folder = clientFolder || 'test-client';
    const name = urlParams.get('name') || 'Anna';
    const filenames = ['photo1_jf7qst', 'photo2_k1wnb8', 'photo3_jjq4li'];

    galleryPhotos = filenames.map(function(f) {
      return BASE_URL + '/w_800,q_70/clients/' + folder + '/' + f + '.jpg';
    });

    renderGallery(name, galleryPhotos);
  }


  function renderGallery(name, photos) {
    document.getElementById('app').innerHTML =
      '<div class="gallery-hero">' +
        '<p class="gallery-greeting">Hello, ' + name + '.</p>' +
        '<p class="gallery-sub">Your Portal Moment is ready.<br>Select a package to receive your full edited collection.</p>' +
      '</div>' +
      '<div class="free-note">' +
        '<p class="free-note-text">Your complimentary photo has already been sent to your email.</p>' +
      '</div>' +
      '<div class="packages">' +
        packages.map(function(pkg) {
          return '<div class="package" id="pkg-' + pkg.id + '" onclick="selectPackage(\'' + pkg.id + '\')">' +
            (pkg.badge ? '<span class="package-badge">' + pkg.badge + '</span>' : '') +
            '<span class="package-name">' + pkg.name + '</span>' +
            '<span class="package-price">' + pkg.price + '</span>' +
            '<span class="package-desc">' + pkg.desc + '</span>' +
          '</div>';
        }).join('') +
      '</div>' +
      '<p class="gallery-label">Your Session</p>' +
      '<p class="gallery-note">Watermarked previews — full resolution delivered after purchase</p>' +
      '<div class="photo-grid">' +
        photos.map(function(photo, i) {
          return '<div class="photo-item" onclick="openLightbox(' + i + ')">' +
            '<img src="' + photo + '" alt="Your Portal Moment" loading="lazy" />' +
          '</div>';
        }).join('') +
      '</div>' +
      '<div class="purchase-section">' +
        '<p class="purchase-summary" id="purchaseSummary">Select a package above to continue</p>' +
        '<button class="purchase-btn" id="purchaseBtn" disabled onclick="handlePurchase()">Purchase Collection</button>' +
        '<p class="purchase-note">Secure payment via Stripe · Instant delivery</p>' +
      '</div>';
  }

  function selectPackage(id) {
    selectedPackage = packages.find(function(p) { return p.id === id; });
    packages.forEach(function(p) {
      document.getElementById('pkg-' + p.id).classList.remove('selected');
    });
    document.getElementById('pkg-' + id).classList.add('selected');
    document.getElementById('purchaseSummary').textContent = selectedPackage.name + ' · ' + selectedPackage.price + ' · ' + selectedPackage.desc;
    document.getElementById('purchaseBtn').disabled = false;
  }

  function handlePurchase() {
    if (!selectedPackage) return;
    window.location.href = selectedPackage.stripeLink + '?prefilled_email=' + encodeURIComponent(clientEmail);
  }

  function showError() {
    document.getElementById('app').innerHTML =
      '<div class="error-state">' +
        '<p class="error-title">Portal not found.</p>' +
        '<p class="error-sub">We couldn\'t find a gallery for this email address.<br>Please check your email or contact us directly.</p>' +
        '<a href="/" class="back-link">← Return to Portal Moments</a>' +
      '</div>';
  }

  function openLightbox(index) {
    lightboxIndex = index;
    document.getElementById('lightboxImg').src = galleryPhotos[index];
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
  function changeLightbox(dir) {
    lightboxIndex = (lightboxIndex + dir + galleryPhotos.length) % galleryPhotos.length;
    document.getElementById('lightboxImg').src = galleryPhotos[lightboxIndex];
  }
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeLightbox();
  });
  document.addEventListener('keydown', function(e) {
    if (document.getElementById('lightbox').classList.contains('open')) {
      if (e.key === 'ArrowLeft') changeLightbox(-1);
      if (e.key === 'ArrowRight') changeLightbox(1);
      if (e.key === 'Escape') closeLightbox();
    }
  });

  loadGallery();
</script>
</body>
</html>
