<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Portal Moments</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #0A0A0A; --gray: #888888; --border: #E0E0E0; --white: #FFFFFF; --light: #FAFAFA; }
  body { background: var(--light); color: var(--black); font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--white); border: 1px solid var(--border); padding: 3rem 2.5rem; width: 340px; text-align: center; }
  .login-title { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.4rem; letter-spacing: -0.02em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .login-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 0.85rem; color: var(--gray); margin-bottom: 2rem; }
  .login-input { width: 100%; border: none; border-bottom: 1px solid var(--border); padding: 0.75rem 0; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.85rem; color: var(--black); outline: none; margin-bottom: 1.5rem; background: transparent; text-align: center; transition: border-color 0.2s ease; }
  .login-input:focus { border-color: var(--black); }
  .login-btn { width: 100%; background: rgba(10,10,10,0.8); color: var(--white); border: none; padding: 0.85rem; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: background 0.2s ease; }
  .login-btn:hover { background: rgba(10,10,10,0.95); }
  .login-error { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #cc4444; margin-top: 1rem; display: none; }
  .admin-wrap { display: none; width: 100%; }
  .admin-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
  .admin-logo { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; }
  .admin-logout { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); background: none; border: none; cursor: pointer; transition: color 0.2s ease; }
  .admin-logout:hover { color: var(--black); }
  .admin-body { max-width: 900px; margin: 0 auto; padding: 2rem; width: 100%; }
  .section-title { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .new-client-form { background: var(--white); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 2rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-label { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); }
  .form-input { border: none; border-bottom: 1px solid var(--border); padding: 0.6rem 0; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.85rem; color: var(--black); outline: none; background: transparent; transition: border-color 0.2s ease; }
  .form-input:focus { border-color: var(--black); }
  .form-btn { background: rgba(10,10,10,0.8); color: var(--white); border: none; padding: 0.8rem 2rem; font-family: 'Jost', sans-serif; font-weight: 300; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: background 0.2s ease; }
  .form-btn:hover { background: rgba(10,10,10,0.95); }
  .form-actions { display: flex; gap: 0.75rem; align-items: center; }
  .success-msg { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #44aa66; display: none; }
  .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0.75rem; margin-bottom: 2rem; width: 100%; }
  .stat-card { background: var(--white); border: 1px solid var(--border); padding: 1.2rem; text-align: center; cursor: pointer; transition: all 0.2s ease; }
  .stat-card:hover { border-color: var(--black); }
  .stat-card.active { background: var(--black); border-color: var(--black); }
  .stat-card.active .stat-number { color: var(--white); }
  .stat-card.active .stat-label { color: rgba(255,255,255,0.6); }
  .stat-number { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--black); display: block; }
  .stat-label { font-family: 'Jost', sans-serif; font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); }
  .filter-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .filter-clear { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); background: none; border: none; cursor: pointer; text-decoration: underline; display: none; }
  .filter-clear:hover { color: var(--black); }
  .clients-table { width: 100%; border-collapse: collapse; background: var(--white); }
  .clients-table th { font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-weight: 300; }
  .clients-table td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; vertical-align: middle; }
  .clients-table tr:last-child td { border-bottom: none; }
  .clients-table tr:hover td { background: var(--light); }
  .badge { display: inline-block; font-size: 0.5rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; }
  .badge-gallery { background: #E6F0FF; color: #1a5fb4; }
  .badge-purchased { background: #FFF8E6; color: #B8860B; }
  .badge-editing { background: #F0E6FF; color: #6b3fb5; }
  .badge-delivered { background: #E6F7ED; color: #2d6a4f; }
  .badge-expired { background: #FFEEEE; color: #cc4444; }
  .action-btn { font-size: 0.55rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gray); background: none; border: 1px solid var(--border); padding: 4px 10px; cursor: pointer; transition: all 0.2s ease; margin-right: 4px; margin-bottom: 4px; display: inline-block; }
  .action-btn:hover { background: var(--black); color: var(--white); border-color: var(--black); }
  .action-btn.danger:hover { background: #cc4444; border-color: #cc4444; color: var(--white); }
  .action-btn.reset { color: #B8860B; border-color: #F0D080; }
  .action-btn.reset:hover { background: #B8860B; border-color: #B8860B; color: var(--white); }
  .gallery-url { font-size: 0.58rem; color: var(--gray); font-family: 'Jost', sans-serif; word-break: break-all; display: block; margin-bottom: 4px; }
  .expiry-text { font-size: 0.58rem; color: var(--gray); }
  .expiry-text.warning { color: #cc4444; }
  .expiry-text.good { color: #2d6a4f; }
  .loading { text-align: center; padding: 2rem; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gray); }
  @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } .form-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <p class="login-title">Portal Moments</p>
    <p class="login-sub">Admin Access</p>
    <input type="password" class="login-input" id="adminPassword" placeholder="Password" onkeydown="if(event.key==='Enter') login()" />
    <button class="login-btn" onclick="login()">Enter</button>
    <p class="login-error" id="loginError">Incorrect password</p>
  </div>
</div>

<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <span class="admin-logo">Portal Moments — Admin</span>
    <button class="admin-logout" onclick="logout()">Log out</button>
  </div>
  <div class="admin-body">

    <div class="stats-grid">
      <div class="stat-card active" id="stat-all" onclick="setFilter('all')">
        <span class="stat-number" id="statTotal">0</span>
        <span class="stat-label">All Clients</span>
      </div>
      <div class="stat-card" id="stat-purchased" onclick="setFilter('purchased')">
        <span class="stat-number" id="statPurchased">0</span>
        <span class="stat-label">Purchased</span>
      </div>
      <div class="stat-card" id="stat-editing" onclick="setFilter('editing')">
        <span class="stat-number" id="statEditing">0</span>
        <span class="stat-label">Editing</span>
      </div>
      <div class="stat-card" id="stat-delivered" onclick="setFilter('delivered')">
        <span class="stat-number" id="statDelivered">0</span>
        <span class="stat-label">Delivered</span>
      </div>
      <div class="stat-card" id="stat-revenue" onclick="setFilter('all')">
        <span class="stat-number" id="statRevenue">$0</span>
        <span class="stat-label">Revenue</span>
      </div>
    </div>

    <p class="section-title">New Client</p>
    <div class="new-client-form">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Client Name</label>
          <input type="text" class="form-input" id="clientName" placeholder="e.g. Sarah Johnson" />
        </div>
        <div class="form-group">
          <label class="form-label">Client Email</label>
          <input type="email" class="form-input" id="clientEmail" placeholder="sarah@email.com" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cloudinary Folder</label>
          <input type="text" class="form-input" id="clientFolder" placeholder="e.g. sarah-johnson-0406" />
        </div>
        <div class="form-group">
          <label class="form-label">Session Date</label>
          <input type="date" class="form-input" id="clientDate" />
        </div>
      </div>
      <div class="form-actions">
        <button class="form-btn" onclick="addClient()">Create Client Gallery</button>
        <span class="success-msg" id="successMsg">✓ Client created</span>
      </div>
    </div>

    <div class="filter-bar">
      <p class="section-title" style="margin:0;border:none;padding:0" id="filterTitle">All Clients</p>
      <button class="filter-clear" id="filterClear" onclick="setFilter('all')">Clear filter</button>
    </div>

    <table class="clients-table">
      <thead>
        <tr>
          <th>Client</th>
          <th>Session</th>
          <th>Status</th>
          <th>Expiry</th>
          <th>Gallery Link</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="clientsBody"><tr><td colspan="6" class="loading">Loading clients...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
  const ADMIN_PASSWORD = 'portalmoments2026';
  const SITE_URL = window.location.origin;
  const API_URL = '/api/clients';
  const API_SECRET = 'pm-agent-2026';
  var currentFilter = 'all';
  var allClients = [];

  function apiHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + API_SECRET };
  }

  async function apiGet(params) {
    const q = params ? '?' + new URLSearchParams(params).toString() : '';
    const res = await fetch(API_URL + q, { headers: apiHeaders() });
    return res.json();
  }

  async function apiPost(action, body) {
    const res = await fetch(API_URL + '?action=' + action, {
      method: 'POST', headers: apiHeaders(), body: JSON.stringify(body)
    });
    return res.json();
  }

  async function apiPut(action, body) {
    const res = await fetch(API_URL + '?action=' + action, {
      method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body)
    });
    return res.json();
  }

  async function apiDelete(body) {
    const res = await fetch(API_URL + '?action=delete', {
      method: 'DELETE', headers: apiHeaders(), body: JSON.stringify(body)
    });
    return res.json();
  }

  function login() {
    const pw = document.getElementById('adminPassword').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('adminWrap').style.display = 'block';
      sessionStorage.setItem('pm_admin', '1');
      loadClients();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function logout() {
    sessionStorage.removeItem('pm_admin');
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('adminWrap').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  if (sessionStorage.getItem('pm_admin')) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadClients();
  }

  async function loadClients() {
    try {
      const data = await apiGet();
      allClients = data.clients || [];
      renderClients();
    } catch(e) {
      document.getElementById('clientsBody').innerHTML = '<tr><td colspan="6" class="loading">Error loading clients. Check your connection.</td></tr>';
    }
  }

  async function addClient() {
    const name = document.getElementById('clientName').value.trim();
    const email = document.getElementById('clientEmail').value.trim();
    const folder = document.getElementById('clientFolder').value.trim();
    const date = document.getElementById('clientDate').value;
    if (!name || !email || !folder) { alert('Please fill in name, email and folder.'); return; }
    const data = await apiPost('create', { name, email, folder, date });
    if (data.error) { alert('Error: ' + data.error); return; }
    document.getElementById('clientName').value = '';
    document.getElementById('clientEmail').value = '';
    document.getElementById('clientFolder').value = '';
    document.getElementById('clientDate').value = '';
    const msg = document.getElementById('successMsg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 3000);
    await loadClients();
  }

  function galleryUrl(client) {
    const firstName = encodeURIComponent(client.name.split(' ')[0]);
    const fullName = encodeURIComponent(client.name);
    const state = client.status === 'delivered' ? 'delivered' : 
                  (client.status === 'editing' || client.status === 'purchased') ? 'purchased' : '';
    const stateParam = state ? '&state=' + state : '';
    const expiryParam = client.expiry ? '&expiry=' + client.expiry : '';
    const selectedParam = (client.selectedPhotos && client.selectedPhotos.length > 0 && state !== 'delivered') 
      ? '&selected=' + encodeURIComponent(client.selectedPhotos.join(',')) : '';
    return SITE_URL + '/gallery.html?email=' + encodeURIComponent(client.email) + '&folder=' + client.folder + '&name=' + firstName + '&fullname=' + fullName + expiryParam + stateParam + selectedParam;
  }

  function expiryInfo(client) {
    if (!client.expiry) return '<span class="expiry-text">—</span>';
    const days = Math.ceil((new Date(client.expiry) - new Date()) / (1000 * 60 * 60 * 24));
    if (days < 0) return '<span class="expiry-text warning">Expired</span>';
    if (days <= 5) return '<span class="expiry-text warning">' + days + ' days left</span>';
    if (client.status === 'delivered') return '<span class="expiry-text good">' + days + ' days to download</span>';
    return '<span class="expiry-text">' + days + ' days left</span>';
  }

  function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active'));
    const el = document.getElementById('stat-' + (filter === 'all' ? 'all' : filter));
    if (el) el.classList.add('active');
    const titles = { all: 'All Clients', purchased: 'Purchased', editing: 'Editing', delivered: 'Delivered' };
    document.getElementById('filterTitle').textContent = titles[filter] || 'All Clients';
    document.getElementById('filterClear').style.display = filter === 'all' ? 'none' : 'inline';
    renderClients();
  }

  function renderClients() {
    const clients = currentFilter === 'all' ? allClients : allClients.filter(c => c.status === currentFilter);

    document.getElementById('statTotal').textContent = allClients.length;
    document.getElementById('statPurchased').textContent = allClients.filter(c => c.status === 'purchased' || c.status === 'editing' || c.status === 'delivered').length;
    document.getElementById('statEditing').textContent = allClients.filter(c => c.status === 'editing').length;
    document.getElementById('statDelivered').textContent = allClients.filter(c => c.status === 'delivered').length;
    document.getElementById('statRevenue').textContent = '$' + allClients.reduce((s, c) => s + (c.revenue || 0), 0);

    const body = document.getElementById('clientsBody');
    if (clients.length === 0) {
      body.innerHTML = '<tr><td colspan="6" class="loading">' + (currentFilter === 'all' ? 'No clients yet' : 'No clients in this category') + '</td></tr>';
      return;
    }

    const statusBadge = (status, expiry) => {
      if (expiry && new Date(expiry) < new Date() && status !== 'delivered') return '<span class="badge badge-expired">Expired</span>';
      const map = { gallery: ['Gallery Ready','badge-gallery'], purchased: ['Purchased','badge-purchased'], editing: ['Editing','badge-editing'], delivered: ['Delivered','badge-delivered'] };
      const [label, cls] = map[status] || ['Unknown',''];
      return '<span class="badge ' + cls + '">' + label + '</span>';
    };

    const progressBtn = (client) => {
      if (client.status === 'gallery') return '<button class="action-btn" onclick="setStatus(\'' + client.email + '\',\'purchased\')">Mark Purchased</button>';
      if (client.status === 'purchased') return '<button class="action-btn" onclick="setStatus(\'' + client.email + '\',\'editing\')">Mark Editing</button>';
      if (client.status === 'editing') return '<button class="action-btn" onclick="setStatus(\'' + client.email + '\',\'delivered\')">Mark Delivered</button>';
      return '';
    };

    body.innerHTML = clients.map(client => {
      const url = galleryUrl(client);
      const safeEmail = client.email.replace(/'/g, "\\'");
      return '<tr>' +
        '<td><div style="font-size:0.85rem">' + client.name + '</div><div style="font-size:0.7rem;color:var(--gray)">' + client.email + '</div></td>' +
        '<td style="font-size:0.75rem;color:var(--gray)">' + (client.date || '—') + '</td>' +
        '<td>' + statusBadge(client.status, client.expiry) + '</td>' +
        '<td>' + expiryInfo(client) + '</td>' +
        '<td><span class="gallery-url">' + url.replace(window.location.origin,'').substring(0,50) + '...</span>' +
          '<button class="action-btn" onclick="copyLink(\'' + url.replace(/'/g,"\\'") + '\',this)" style="margin-top:4px">Copy link</button>' +
        '</td>' +
        '<td>' +
          '<button class="action-btn" onclick="openGallery(\'' + safeEmail + '\')">View</button>' +
          progressBtn(client) +
          '<button class="action-btn reset" onclick="resetStatus(\'' + safeEmail + '\')">Reset</button>' +
          '<button class="action-btn" onclick="extendExpiry(\'' + safeEmail + '\')">+30 days</button>' +
          '<button class="action-btn danger" onclick="deleteClient(\'' + safeEmail + '\')">Delete</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function copyLink(url, btn) {
    navigator.clipboard.writeText(url);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  }

  function openGallery(email) {
    const client = allClients.find(c => c.email === email);
    if (client) window.open(galleryUrl(client), '_blank');
  }

  async function setStatus(email, status) {
    await apiPut('update', { email, status });
    await loadClients();
  }

  async function resetStatus(email) {
    if (!confirm('Reset this client back to Gallery Ready?')) return;
    await apiPut('update', { email, status: 'gallery', expiry: null });
    await loadClients();
  }

  async function extendExpiry(email) {
    await apiPut('extend', { email });
    await loadClients();
  }

  async function deleteClient(email) {
    if (!confirm('Delete this client? This cannot be undone.')) return;
    await apiDelete({ email });
    await loadClients();
  }
</script>
</body>
</html>
